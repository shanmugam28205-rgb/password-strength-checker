<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🔐 Password Strength Checker</h1>
    <p class="subtitle">Type a password to see how strong it is</p>

    <div class="input-wrapper">
      <input type="password" id="passwordInput" placeholder="Enter password..." autocomplete="off">
      <button id="toggleBtn" type="button">👁</button>
    </div>

    <div class="meter">
      <div id="meterBar" class="meter-bar"></div>
    </div>

    <p id="strengthLabel" class="strength-label">Strength: -</p>
    <p id="crackTime" class="crack-time"></p>

    <ul id="tipsList" class="tips"></ul>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
